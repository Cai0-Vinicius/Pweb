<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade9</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>

    <h3>1) Maior de três números</h3>
    <label for="n1">Número 1</label>
    <input type="number" id="n1" placeholder="Digite um número">
    <label for="n2">Número 2</label>
    <input type="number" id="n2" placeholder="Digite um número">
    <label for="n3">Número 3</label>
    <input type="number" id="n3" placeholder="Digite um número">
    <div class="actions">
        <button onclick="executarMaior()">Verificar</button>
    </div>
    <p id="resMaior"></p>

    <hr>

    <h3>2) Ordem crescente</h3>
    <label for="o1">Número 1</label>
    <input type="number" id="o1" placeholder="Digite um número">
    <label for="o2">Número 2</label>
    <input type="number" id="o2" placeholder="Digite um número">
    <label for="o3">Número 3</label>
    <input type="number" id="o3" placeholder="Digite um número">
    <div class="actions">
        <button onclick="executarOrdem()">Ordenar</button>
    </div>
    <p id="resOrdem"></p>

    <hr>

    <h3>3) Palíndromo</h3>
    <label for="palavra">Palavra</label>
    <input type="text" id="palavra" placeholder="Digite uma palavra">
    <div class="actions">
        <button onclick="executarPalindromo()">Verificar</button>
    </div>
    <p id="resPalindromo"></p>

    <hr>

    <h3>4) Subconjunto</h3>
    <label for="p1">Palavra 1</label>
    <input type="text" id="p1" placeholder="Digite a primeira palavra">
    <label for="p2">Palavra 2</label>
    <input type="text" id="p2" placeholder="Digite a segunda palavra">
    <div class="actions">
        <button onclick="executarSubconjunto()">Verificar</button>
    </div>
    <p id="resSubconjunto"></p>

    <hr>

    <h3>5) Dia da semana</h3>
    <label for="data">Data</label>
    <input type="date" id="data">
    <div class="actions">
        <button onclick="executarDia()">Verificar</button>
    </div>
    <p id="resDia"></p>

</body>

</html>
